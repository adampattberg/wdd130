<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->

        <table>
          <tr>
            <th>Speaker</th>
            <th>Title</th>
            <th>Location</th>
            <th>Year</th>
          </tr>
          <tr>
            <td>President Meredith</td>
            <td>Go and Do Thou Likewise</td>
            <td>BYU-I</td>
            <td>2026</td>
          </tr>
          <tr>
            <td>Neihlee Muir</td>
            <td>I Will Prepare the Way Before You</td>
            <td>BYU-I</td>
            <td>2026</td>
          </tr>
          <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
          </tr>
        </table>

        <form>
          <label for="Speaker Name">Speaker Name:</label><br>
          <input type="text" id="speakername" name="speakername">
          <label for="Title of Talk">Title of Talk:</label><br>
          <input type="text" id="talktitle" name="talktitle">
          <label for="Location">Location:</label><br>
          <input type="text" id="location" name="location">
          <label for="Year">Year:</label><br>
          <input type="text" id="year" name="year">
          <input type="submit" value="Submit">
        </form>

      </div>
    </main>
  </div>
</body>
</html>
