<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="favorite_devo/styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->

        <table>
          <tr>
            <th>Speaker</th>
            <th>Title</th>
            <th>Location</th>
            <th>Year</th>
          </tr>
          <tr>
            <td>President Meredith</td>
            <td>Go and Do Thou Likewise</td>
            <td>BYU-I</td>
            <td>2026</td>
          </tr>
          <tr>
            <td>Neihlee Muir</td>
            <td>I Will Prepare the Way Before You</td>
            <td>BYU-I</td>
            <td>2026</td>
          </tr>
          <tr>
            <td>President Oaks</td>
            <td>Coming Closer to Jesus Christ</td>
            <td>BYU-Provo</td>
            <td>2026</td>
          </tr>
        </table>

        <form class="devoform">
          <div class="formrow">
            <label for="Speaker Name">Speaker Name:</label>
            <input type="text" id="speakername" name="speakername">
          </div>  
          <div class="formrow"> 
            <label for="Title of Talk">Title of Talk:</label>
            <input type="text" id="talktitle" name="talktitle">
          </div>
          <div class="formrow">
            <label for="Location">Location:</label>
            <input type="text" id="location" name="location">
          </div>
          <div class="formrow">
            <label for="Year">Year:</label>
            <input type="text" id="year" name="year">
          </div>
            <input type="submit" value="Submit">
          </div>
        </form>

      </div>
    </main>
  </div>
</body>
</html>
